<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            flex: 1;
            background: #111;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .chart-box {
            background: #111;
            padding: 25px;
            border-radius: 15px;
        }

        canvas {
            background: transparent;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Dashboard Overview</h1>

    <div class="cards">
        <div class="card">
            <h3>Total Invoices</h3>
            <p>{{ total_invoices }}</p>
        </div>

        <div class="card">
            <h3>Total Revenue</h3>
            <p>₹ {{ total_revenue }}</p>
        </div>

        <div class="card">
            <h3>Average Amount</h3>
            <p>₹ {{ avg_amount }}</p>
        </div>
    </div>

    <div class="chart-box">
        <h2>Revenue by Vendor</h2>
        <canvas id="vendorChart"></canvas>
    </div>

</div>

<script>
    const vendorData = {{ vendor_counts | tojson }};

    const labels = Object.keys(vendorData);
    const values = Object.values(vendorData);

    const ctx = document.getElementById("vendorChart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Invoices per Vendor",
                data: values,
                backgroundColor: "rgba(99, 102, 241, 0.7)",
                borderRadius: 8
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        color: "white"
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: "white" }
                },
                y: {
                    ticks: { color: "white" }
                }
            }
        }
    });
</script>

</body>
</html>
